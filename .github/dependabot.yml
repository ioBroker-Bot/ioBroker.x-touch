version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "1 3 11 * *"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 20
    assignees:
      - "Bannsaenger"
    versioning-strategy: increase

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "1 3 11 * *"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 20
    assignees:
      - "Bannsaenger"
